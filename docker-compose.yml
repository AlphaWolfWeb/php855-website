version: "3.8"

services:
  php:
    image: alphawolfweb/php855-website:latest
    container_name: "${DOMAIN_COM}"
    restart: unless-stopped
    volumes:
      - /opt/docker/${DOMAIN_COM:-example_com}:/var/www
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${NETWORK:-web-network}
