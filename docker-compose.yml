version: "3.8"

services:
  php:
    image: alphawolfweb:php855-website
    container_name: "${DOMAIN_COM:-example_com}"
    restart: unless-stopped
    user: 33:33
    volumes:
      - /opt/docker/${DOMAIN_COM:-example_com}:/var/www
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${NETWORK:-web-network}
